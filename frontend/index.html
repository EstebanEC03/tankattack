<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tank Attack — Vaporwave</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <h1>TANK&nbsp;·&nbsp;ATTACK</h1>
        <nav id="view-switcher">
          <button data-view="play" class="active">Jugar</button>
          <button data-view="editor">Editor</button>
        </nav>
      </header>

      <main id="play-view" class="view active">
        <section id="hud">
          <div class="hud-card">
            <span class="hud-label">VIDAS</span>
            <span id="hud-lives" class="hud-value">3</span>
          </div>
          <div class="hud-card">
            <span class="hud-label">NIVEL</span>
            <span id="hud-level" class="hud-value">1</span>
          </div>
          <div class="hud-card">
            <span class="hud-label">OBJETIVOS</span>
            <span id="hud-objectives" class="hud-value">0</span>
          </div>
          <div class="hud-card">
            <span class="hud-label">ENEMIGOS</span>
            <span id="hud-enemies" class="hud-value">0</span>
          </div>
          <div class="hud-card hud-status">
            <span class="hud-label">ESTADO</span>
            <span id="hud-status" class="hud-value">—</span>
          </div>
        </section>

        <div id="game-stage">
          <canvas id="game-canvas" width="640" height="480"></canvas>
          <div id="overlay" class="hidden">
            <div id="overlay-content">
              <h2 id="overlay-title">TANK ATTACK</h2>
              <p id="overlay-message">Presiona Iniciar para jugar</p>
              <div class="overlay-actions">
                <button id="overlay-start">Iniciar partida</button>
                <button id="overlay-restart" class="hidden">Reiniciar</button>
                <button id="overlay-next" class="hidden">Siguiente nivel</button>
              </div>
            </div>
          </div>
        </div>

        <aside id="enemy-roster">
          <h3>IA de enemigos</h3>
          <ul id="enemy-list"></ul>
        </aside>
      </main>

      <main id="editor-view" class="view">
        <section id="editor-toolbar">
          <h2>Editor de niveles</h2>
          <div class="editor-tools">
            <button data-tool="WALL">Muro</button>
            <button data-tool="PLAYER">Jugador</button>
            <button data-tool="ENEMY_RAPIDO" class="active">Rápido</button>
            <button data-tool="ENEMY_PESADO">Pesado</button>
            <button data-tool="ENEMY_TACTICO">Táctico</button>
            <button data-tool="OBJECTIVE_BASE">Base</button>
            <button data-tool="OBJECTIVE_REFINERIA">Refinería</button>
            <button data-tool="ERASE">Borrar</button>
          </div>
          <div class="editor-actions">
            <label>Tamaño:
              <input id="editor-width" type="number" min="5" max="40" value="20" />
              x
              <input id="editor-height" type="number" min="5" max="40" value="15" />
            </label>
            <button id="editor-resize">Aplicar tamaño</button>
            <button id="editor-save">Guardar nivel</button>
            <button id="editor-load">Cargar nivel…</button>
            <input id="editor-load-id" type="text" placeholder="nivel1" />
            <button id="editor-play">Probar nivel</button>
          </div>
        </section>
        <div id="editor-stage">
          <canvas id="editor-canvas" width="640" height="480"></canvas>
        </div>
      </main>

      <footer id="bottombar">
        <span class="legend">
          Controles:
          <kbd>W</kbd>/<kbd>↑</kbd>
          <kbd>A</kbd>/<kbd>←</kbd>
          <kbd>S</kbd>/<kbd>↓</kbd>
          <kbd>D</kbd>/<kbd>→</kbd> mover ·
          <kbd>Espacio</kbd> disparar ·
          <kbd>P</kbd> pausa ·
          <kbd>R</kbd> reiniciar
        </span>
        <span id="ws-status" class="ws-status disconnected">WS: desconectado</span>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
